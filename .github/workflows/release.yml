name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Build
        run: |
          mkdir -p dist
          CGO_ENABLED=0 GOOS=linux GOARCH=${{ matrix.goarch }} \
            go build -trimpath \
              -ldflags "-s -w -X main.version=${GITHUB_REF_NAME}" \
              -o dist/gouse-linux-${{ matrix.goarch }} ./cmd/gouse

      - uses: actions/upload-artifact@v4
        with:
          name: gouse-linux-${{ matrix.goarch }}
          path: dist/gouse-linux-${{ matrix.goarch }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Checksums
        working-directory: dist
        run: sha256sum gouse-linux-* > SHA256SUMS

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/gouse-linux-amd64
            dist/gouse-linux-arm64
            dist/SHA256SUMS
          generate_release_notes: true
