name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Build
        run: |
          mkdir -p dist
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
            go build -trimpath \
              -ldflags "-s -w -X main.version=${GITHUB_REF_NAME}" \
              -o dist/gouse-linux-amd64 ./cmd/gouse

      - name: Checksums
        working-directory: dist
        run: sha256sum gouse-linux-amd64 > SHA256SUMS

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/gouse-linux-amd64
            dist/SHA256SUMS
          generate_release_notes: true
